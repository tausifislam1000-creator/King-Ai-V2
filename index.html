<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  
  <meta name="google-site-verification" content="h6W70zVTHJEjoCmCEf97HHHXgetZ2IOLzKjIo-p-83E" />
  <title>King AI — The Royal AI Assistant by Tausif Islam</title>
  <meta name="description" content="King AI is a powerful, always-online AI assistant built by Tausif Islam. Ask anything, get instant answers from the best free AI models.">
  <meta name="keywords" content="King AI, Tausif Islam, AI Assistant, Free AI, ChatBot, Always Online AI">
  <meta name="author" content="Tausif Islam">

  <meta property="og:title" content="King AI — Powered by Tausif Islam">
  <meta property="og:description" content="Ask your King anything. The ultimate free AI experience.">
  <meta property="og:type" content="website">

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#050712;--bg2:#0a0e1a;--surface:#0f1420;--surface2:#151b2a;
      --border:#1e2538;--gold:#f0c040;--gold2:#ffd700;
      --gold-dim:rgba(240,192,64,0.08);--text:#e8edf7;--muted:#6b7a99;
      --green:#3fb950;--blue:#58a6ff;--purple:#b794f6;
      --user-bg:linear-gradient(135deg,#1a2f4d,#0d1f38);
      --glow-gold:0 0 30px rgba(240,192,64,0.3);
    }

    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;}

    /* Enhanced Star Field */
    .stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;background:radial-gradient(ellipse at top,rgba(10,14,26,0.8),transparent 50%);}
    .star{position:absolute;border-radius:50%;background:white;box-shadow:0 0 3px rgba(255,255,255,0.5);opacity:0;animation:twinkle var(--d,4s) var(--delay,0s) infinite ease-in-out;}
    @keyframes twinkle{0%,100%{opacity:0;transform:scale(.7) translateY(0);}50%{opacity:var(--op,.6);transform:scale(1) translateY(-2px);}}

    .particle{position:absolute;width:2px;height:2px;background:var(--gold);border-radius:50%;pointer-events:none;animation:float 8s infinite ease-in-out;opacity:0.3;}
    @keyframes float{0%,100%{transform:translateY(0) translateX(0) scale(1);opacity:0.3;}50%{transform:translateY(-30px) translateX(10px) scale(1.5);opacity:0.6;}}

    .orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:0.15;pointer-events:none;z-index:0;animation:orbFloat 20s infinite ease-in-out;}
    .orb1{width:400px;height:400px;background:radial-gradient(circle,var(--gold2),transparent);top:10%;left:10%;animation-delay:0s;}
    .orb2{width:300px;height:300px;background:radial-gradient(circle,var(--blue),transparent);bottom:20%;right:15%;animation-delay:5s;}
    @keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(30px,-20px) scale(1.1);}66%{transform:translate(-20px,30px) scale(0.9);}}

    .app{position:relative;z-index:1;display:flex;flex-direction:column;height:100dvh;}

    header{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:rgba(8,11,20,0.85);border-bottom:1px solid rgba(240,192,64,0.15);flex-shrink:0;position:relative;backdrop-filter:blur(24px) saturate(180%);box-shadow:0 4px 24px rgba(0,0,0,0.4);}
    .brand{display:flex;align-items:center;gap:13px;text-decoration:none;}
    .crown-wrap{width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(240,192,64,0.25),rgba(240,192,64,0.08));border:1.5px solid rgba(240,192,64,0.4);border-radius:14px;animation:crownFloat 3s ease-in-out infinite;box-shadow:var(--glow-gold);}
    @keyframes crownFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}

    .brand-name{font-family:'Cinzel',serif;font-size:20px;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,#ffd700 0%,#fff8cc 50%,#f0c040 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .status-badge{display:flex;align-items:center;gap:7px;padding:7px 14px;background:rgba(63,185,80,0.12);border:1px solid rgba(63,185,80,0.3);border-radius:20px;font-size:11px;font-weight:600;color:var(--green);}
    .status-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.3);}}

    .layout{display:flex;flex:1;overflow:hidden;}
    .sidebar{width:260px;background:rgba(8,11,20,0.8);border-right:1px solid rgba(240,192,64,0.12);display:flex;flex-direction:column;padding:18px 14px;gap:12px;flex-shrink:0;backdrop-filter:blur(20px);}
    .welcome-card{text-align:center;padding:18px;background:linear-gradient(135deg,rgba(240,192,64,0.1),rgba(240,192,64,0.05));border:1px solid rgba(240,192,64,0.25);border-radius:14px;}
    .welcome-text{color:var(--gold);font-weight:600;font-size:13px;margin-top:6px;}

    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .stat-card{background:rgba(240,192,64,0.05);border:1px solid rgba(240,192,64,0.15);border-radius:10px;padding:12px;text-align:center;}
    .stat-value{font-size:20px;font-weight:700;color:var(--gold);}
    .stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;}

    .chat-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;}
    .messages{flex:1;overflow-y:auto;padding:28px 24px;display:flex;flex-direction:column;gap:24px;}
    .msg{display:flex;gap:13px;max-width:880px;width:100%;align-self:center;animation:messageSlideIn 0.4s ease-out forwards;}
    @keyframes messageSlideIn{from{opacity:0;transform:translateY(15px);}to{opacity:1;transform:translateY(0);}}
    .msg.user{flex-direction:row-reverse;}
    .avatar{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
    .msg.ai .avatar{background:rgba(240,192,64,0.1);border:1px solid rgba(240,192,64,0.3);}
    .bubble{padding:14px 18px;border-radius:16px;font-size:14px;line-height:1.7;max-width:calc(100% - 56px);backdrop-filter:blur(10px);}
    .msg.ai .bubble{background:rgba(15,20,32,0.7);border:1px solid rgba(240,192,64,0.15);border-top-left-radius:4px;}
    .msg.user .bubble{background:var(--user-bg);border:1px solid rgba(88,166,255,0.25);border-top-right-radius:4px;}

    .input-area{padding:16px 24px 20px;background:rgba(8,11,20,0.95);border-top:1px solid rgba(240,192,64,0.15);flex-shrink:0;}
    .input-container{max-width:880px;margin:0 auto;}
    .action-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
    .action-btn{padding:7px 13px;background:rgba(240,192,64,0.08);border:1px solid rgba(240,192,64,0.2);border-radius:10px;color:var(--text);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;}
    
    .input-wrap{display:flex;align-items:flex-end;gap:11px;background:rgba(15,20,32,0.8);border:1.5px solid rgba(240,192,64,0.2);border-radius:16px;padding:12px 16px;}
    #chat-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:14px;resize:none;max-height:120px;}
    .send-btn{width:42px;height:42px;background:linear-gradient(135deg,#d4a52e,var(--gold));border:none;border-radius:11px;cursor:pointer;color:var(--bg);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(240,192,64,0.3);}

    @media(max-width:768px){
      .sidebar{display:none;}
      header{padding:10px 15px;}
      .messages,.input-area{padding-left:15px;padding-right:15px;}
    }
  </style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="app">
  <header>
    <div class="brand">
      <div class="crown-wrap"><span>👑</span></div>
      <div class="brand-name">KING AI</div>
    </div>
    <div class="status-badge">
      <div class="status-dot"></div> ALWAYS ONLINE
    </div>
  </header>
  
  <div class="layout">
    <aside class="sidebar">
      <div class="welcome-card">
        <div style="font-size:32px;">👑</div>
        <div class="welcome-text">Welcome, Your Majesty</div>
      </div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-value" id="msg-count">0</div><div class="stat-label">Messages</div></div>
        <div class="stat-card"><div class="stat-value" id="session-time">0m</div><div class="stat-label">Session</div></div>
      </div>
    </aside>
    
    <div class="chat-wrap">
      <div class="messages" id="messages">
        <div class="msg ai">
          <div class="avatar">👑</div>
          <div class="bubble">Greetings! I am <strong>King AI</strong>, built by <strong>Tausif Islam</strong>. How may I serve you?</div>
        </div>
      </div>
      
      <div class="input-area">
        <div class="input-container">
          <div class="action-bar">
            <button class="action-btn" onclick="clearChat()">🗑️ Clear History</button>
            <div id="char-count" style="font-size:11px; color:var(--muted)">0 / 2000</div>
          </div>
          <div class="input-wrap">
            <textarea id="chat-input" placeholder="Ask your King..." rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px';updateCount()"></textarea>
            <button class="send-btn" onclick="sendMsg()">➤</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let history = [];
let msgCount = 0;
let startTime = Date.now();

function updateCount() {
  document.getElementById('char-count').innerText = `${document.getElementById('chat-input').value.length} / 2000`;
}

function clearChat() {
  if(confirm("Clear the royal scrolls?")) {
    document.getElementById('messages').innerHTML = '';
    history = [];
  }
}

async function sendMsg() {
  const inp = document.getElementById('chat-input');
  const txt = inp.value.trim();
  if(!txt) return;
  
  inp.value = ''; inp.style.height = 'auto';
  addMessage('user', txt);
  history.push({role: "user", content: txt});

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: "openrouter/auto", messages: history })
    });
    const data = await res.json();
    const reply = data.choices[0].message.content;
    addMessage('ai', reply);
    history.push({role: "assistant", content: reply});
    msgCount += 2;
    document.getElementById('msg-count').innerText = msgCount;
  } catch (e) {
    addMessage('ai', "⚠️ Kingdom connection failed.");
  }
}

function addMessage(role, text) {
  const m = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = `msg ${role}`;
  d.innerHTML = `<div class="avatar">${role==='ai'?'👑':'👤'}</div><div class="bubble">${text}</div>`;
  m.appendChild(d);
  m.scrollTop = m.scrollHeight;
}

// Background stars
const container = document.getElementById('stars');
for(let i=0; i<80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.left = Math.random()*100+'%';
  s.style.top = Math.random()*100+'%';
  s.style.setProperty('--d', (Math.random()*3+2)+'s');
  container.appendChild(s);
}

setInterval(() => {
  document.getElementById('session-time').innerText = Math.floor((Date.now()-startTime)/60000)+'m';
}, 60000);
</script>
</body>
</html>
