<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  
  <title>King AI — The Royal AI Assistant by Tausif Islam</title>
  <meta name="description" content="King AI is a powerful, always-online AI assistant built by Tausif Islam. Ask anything, get instant answers from the best free AI models.">
  <meta name="keywords" content="King AI, Tausif Islam, AI Assistant, Free AI, ChatBot, Always Online AI">
  <meta name="author" content="Tausif Islam">
  <link rel="canonical" href="https://your-site-name.vercel.app/" />

  <meta property="og:title" content="King AI — Powered by Tausif Islam">
  <meta property="og:description" content="Ask your King anything. The ultimate free AI experience.">
  <meta property="og:type" content="website">

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Nunito:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet"/>
  
  <style>
    /* CSS remains the same as previous mobile-friendly version */
    :root {
      --bg:#070910; --bg2:#0c0f1a; --surface:#101520; --border:#1c2438;
      --gold:#f0c040; --text:#e6ecf6; --muted:#677590; --green:#3fb950;
      --user-bg:linear-gradient(135deg,#162d4a,#0a1e33);
    }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    html, body { height: 100dvh; font-family:'Nunito', sans-serif; background:var(--bg); color:var(--text); overflow:hidden; }
    .app { display:flex; flex-direction:column; height:100dvh; position:relative; z-index:1; }
    header { display:flex; align-items:center; justify-content:space-between; padding:10px 15px; background:rgba(6,8,14,0.98); border-bottom:1px solid var(--border); backdrop-filter:blur(10px); flex-shrink:0; }
    .brand-name { font-family:'Cinzel', serif; font-size:16px; font-weight:900; letter-spacing:1px; background:linear-gradient(135deg,#ffd700,#f0c040); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .hdr-btns { display:flex; gap:8px; }
    .btn-icon { background:var(--surface); border:1px solid var(--border); color:var(--muted); padding:6px 10px; border-radius:8px; font-size:12px; cursor:pointer; font-weight:bold; }
    .messages { flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:15px; scroll-behavior:smooth; }
    .msg { display:flex; gap:10px; max-width:100%; animation:fadeIn 0.3s ease; }
    .msg.user { flex-direction:row-reverse; }
    .bubble { padding:10px 14px; border-radius:15px; font-size:14px; line-height:1.5; word-break:break-word; max-width:85%; }
    .msg.ai .bubble { background:var(--surface); border:1px solid var(--border); border-bottom-left-radius:2px; }
    .msg.user .bubble { background:var(--user-bg); border:1px solid rgba(88,166,255,0.2); border-bottom-right-radius:2px; }
    .input-area { padding:10px; background:var(--bg2); border-top:1px solid var(--border); padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
    .input-wrap { display:flex; align-items:flex-end; gap:8px; max-width:800px; margin:0 auto; background:var(--surface); padding:8px 12px; border-radius:20px; border:1px solid var(--border); }
    #chat-input { flex:1; background:none; border:none; outline:none; color:var(--text); font-size:16px; resize:none; max-height:100px; padding:4px 0; }
    .send-btn { width:34px; height:34px; background:var(--gold); border:none; border-radius:50%; color:#000; font-weight:bold; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    @keyframes fadeIn { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
  </style>
</head>
<body>

<div class="app">
  <header>
    <div class="brand"><span class="brand-name">KING AI 👑</span></div>
    <div class="hdr-btns">
      <button class="btn-icon" onclick="clearChat()">🗑️ Clear</button>
    </div>
  </header>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome" style="text-align:center; padding:40px 20px;">
      <h1 style="font-family:'Cinzel', serif; color:var(--gold); font-size:24px;">King AI</h1>
      <p style="color:var(--muted);">Always Online. Always Intelligent.</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="chat-input" rows="1" placeholder="Type your message..." oninput="autoSize(this)"></textarea>
      <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>
  </div>
</div>

<script>
let history = [];
const msgContainer = document.getElementById('messages');

function autoSize(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }

function clearChat() { if(confirm("Clear history?")) { history = []; location.reload(); } }

function addMsg(role, text) {
  const w = document.getElementById('welcome'); if(w) w.remove();
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="bubble">${text}</div>`;
  msgContainer.appendChild(div);
  msgContainer.scrollTop = msgContainer.scrollHeight;
}

async function sendMsg() {
  const inp = document.getElementById('chat-input');
  const text = inp.value.trim();
  if(!text) return;
  inp.value = ''; inp.style.height = 'auto';
  addMsg('user', text);
  history.push({role: "user", content: text});
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: "openrouter/auto", messages: history })
    });
    const data = await res.json();
    const reply = data.choices[0].message.content;
    addMsg('ai', reply);
    history.push({role: "assistant", content: reply});
  } catch (e) { addMsg('ai', "⚠️ Error connecting."); }
}
</script>
</body>
</html>
