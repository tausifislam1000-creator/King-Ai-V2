<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>King AI — The Royal AI Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#050712; --gold:#f0c040; --gold2:#ffd700; --text:#e8edf7; --muted:#6b7a99;
      --user-bg:linear-gradient(135deg,#1a2f4d,#0d1f38);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{height:100dvh;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;display:flex;flex-direction:column;}
    
    header{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:rgba(8,11,20,0.85);border-bottom:1px solid rgba(240,192,64,0.15);backdrop-filter:blur(24px);}
    .brand{display:flex;align-items:center;gap:13px;font-family:'Cinzel',serif;font-weight:900;letter-spacing:2px;color:var(--gold);}
    
    .layout{display:flex;flex:1;overflow:hidden;}
    .sidebar{width:260px;background:rgba(8,11,20,0.8);border-right:1px solid rgba(240,192,64,0.12);padding:18px;display:flex;flex-direction:column;gap:12px;}
    
    .chat-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}
    .messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:20px;}
    .msg{display:flex;gap:12px;max-width:850px;width:100%;align-self:center;}
    .msg.user{flex-direction:row-reverse;}
    .bubble{padding:12px 16px;border-radius:14px;font-size:14px;line-height:1.6;background:rgba(15,20,32,0.8);border:1px solid rgba(240,192,64,0.2);}
    .msg.user .bubble{background:var(--user-bg);border:1px solid rgba(88,166,255,0.3);}

    .input-area{padding:20px;background:rgba(8,11,20,0.95);border-top:1px solid rgba(240,192,64,0.15);}
    .input-container{max-width:850px;margin:0 auto;}
    
    /* Model Selector Styling */
    .input-wrap{display:flex;align-items:center;gap:10px;background:rgba(15,20,32,0.8);border:1.5px solid rgba(240,192,64,0.3);border-radius:16px;padding:8px 16px;}
    
    #model-select {
      background: transparent;
      color: var(--gold);
      border: none;
      border-right: 1px solid rgba(240,192,64,0.2);
      padding-right: 10px;
      font-size: 12px;
      font-weight: 600;
      outline: none;
      cursor: pointer;
      max-width: 120px;
    }
    #model-select option { background: var(--bg); color: #fff; }

    textarea{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:14px;resize:none;padding:8px 0;}
    .send-btn{background:var(--gold);border:none;width:38px;height:38px;border-radius:10px;cursor:pointer;font-weight:bold;}

    @media(max-width:768px){ .sidebar{display:none;} }
  </style>
</head>
<body>

<header>
  <div class="brand">👑 KING AI</div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div style="text-align:center; padding:20px; border:1px solid var(--gold); border-radius:15px;">
      <p style="color:var(--gold)">Royal Session</p>
      <h2 id="msg-count">0</h2>
      <p style="font-size:10px; color:var(--muted)">Messages Sent</p>
    </div>
  </aside>

  <div class="chat-wrap">
    <div class="messages" id="messages">
      <div class="msg ai"><div class="bubble">Choose your advisor and speak, Your Majesty.</div></div>
    </div>

    <div class="input-area">
      <div class="input-container">
        <div class="input-wrap">
          <select id="model-select">
            <option value="anthropic/claude-3.5-haiku-20241022">C-3.5 haiku</option>
            <option value="anthropic/claude-3.5-sonnet-20240620">C-3.5 sonnet</option>
            <option value="anthropic/claude-3-sonnet">C-3 sonnet</option>
            <option value="deepseek/deepseek-r1-0528:free">Deepseek-R1</option>
            <option value="google/gemini-2.5-flash-preview-09-2025">Gemini-2.5flash</option>
            <option value="qwen/qwen3-vl-30b-a3b-thinking">Qwen-3</option>
            <option value="openai/gpt-4.5-preview">GPT-4.5</option>
            <option value="openai/chatgpt-4o-latest">CHATGPT-4o</option>
            <option value="openai/codex-mini">Codex-Mini</option>
          </select>
          <textarea id="chat-input" placeholder="Ask your King..." rows="1"></textarea>
          <button class="send-btn" onclick="sendMsg()">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let history = [];
let msgCount = 0;

async function sendMsg() {
  const inp = document.getElementById('chat-input');
  const model = document.getElementById('model-select').value;
  const txt = inp.value.trim();
  if(!txt) return;

  addMessage('user', txt);
  inp.value = '';
  history.push({role: "user", content: txt});

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: model, messages: history })
    });
    const data = await res.json();
    const reply = data.choices[0].message.content;
    
    addMessage('ai', reply);
    history.push({role: "assistant", content: reply});
    msgCount++;
    document.getElementById('msg-count').innerText = msgCount;
  } catch (e) {
    addMessage('ai', "⚠️ Connection to the kingdom lost.");
  }
}

function addMessage(role, text) {
  const m = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = `msg ${role}`;
  d.innerHTML = `<div class="bubble">${text}</div>`;
  m.appendChild(d);
  m.scrollTop = m.scrollHeight;
}
</script>
</body>
</html>
