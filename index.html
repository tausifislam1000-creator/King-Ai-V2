<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>King AI — Always Online</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Nunito:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* CSS remains the same as your original style */
:root{
  --bg:#070910;--bg2:#0c0f1a;--surface:#101520;--surface2:#171d2c;
  --border:#1c2438;--gold:#f0c040;--gold2:#ffd700;
  --gold-dim:rgba(240,192,64,0.12);--text:#e6ecf6;--muted:#677590;
  --green:#3fb950;--blue:#58a6ff;
  --user-bg:linear-gradient(135deg,#162d4a,#0a1e33);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.star{position:absolute;border-radius:50%;opacity:0;animation:twinkle var(--d,3s) var(--delay,0s) infinite ease-in-out;}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(.8);}50%{opacity:var(--op,.5);transform:scale(1);}}
.app{position:relative;z-index:1;display:flex;flex-direction:column;height:100dvh;}
header{display:flex;align-items:center;justify-content:space-between;padding:11px 22px;background:rgba(6,8,14,0.97);border-bottom:1px solid var(--border);flex-shrink:0;position:relative;backdrop-filter:blur(20px);}
.brand{display:flex;align-items:center;gap:11px;text-decoration:none;}
.crown-wrap{width:38px;height:38px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(240,192,64,0.2),rgba(240,192,64,0.05));border:1px solid rgba(240,192,64,0.3);border-radius:12px;animation:crownFloat 3.5s ease-in-out infinite;box-shadow:0 0 20px rgba(240,192,64,0.2);}
@keyframes crownFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}
.brand-name{font-family:'Cinzel',serif;font-size:18px;font-weight:900;letter-spacing:2.5px;background:linear-gradient(135deg,#ffd700,#fff8cc,#f0c040);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.layout{display:flex;flex:1;overflow:hidden;}
.sidebar{width:218px;background:rgba(6,8,14,0.97);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:14px 11px;gap:3px;flex-shrink:0;}
.chat-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.messages{flex:1;overflow-y:auto;padding:24px 20px;display:flex;flex-direction:column;gap:20px;}
.msg{display:flex;gap:11px;max-width:840px;width:100%;align-self:center;}
.msg.user{flex-direction:row-reverse;}
.bubble{padding:12px 16px;border-radius:13px;font-size:13.5px;line-height:1.78;max-width:calc(100% - 46px);}
.msg.ai .bubble{background:var(--surface);border:1px solid var(--border);border-top-left-radius:3px;}
.msg.user .bubble{background:var(--user-bg);border:1px solid rgba(88,166,255,0.15);border-top-right-radius:3px;}
.input-area{padding:12px 20px 16px;background:rgba(5,7,13,0.98);border-top:1px solid var(--border);flex-shrink:0;}
.input-wrap{display:flex;align-items:flex-end;gap:9px;background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:9px 13px;max-width:840px;margin:0 auto;}
#chat-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:14px;resize:none;}
.send-btn{width:37px;height:37px;background:linear-gradient(135deg,#c8941a,var(--gold));border:none;border-radius:9px;cursor:pointer;}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="app">
  <header>
    <div class="brand">
      <div class="crown-wrap">👑</div>
      <div class="brand-name">KING AI</div>
    </div>
    <div style="color:var(--green); font-size:10px; font-weight:bold;">● ALWAYS ONLINE</div>
  </header>
  <div class="layout">
    <aside class="sidebar">
      <div style="text-align:center; padding:10px; color:var(--gold); border:1px solid var(--border); border-radius:10px;">👑 Welcome, Your Majesty</div>
    </aside>
    <div class="chat-wrap">
      <div class="messages" id="messages"></div>
      <div class="input-area">
        <div class="input-wrap">
          <textarea id="chat-input" placeholder="Ask King AI anything..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
          <button class="send-btn" id="send-btn" onclick="sendMsg()">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let history = [];

async function sendMsg() {
  const inp = document.getElementById('chat-input');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  
  addMessage('user', text);
  history.push({role: "user", content: text});

  try {
    // This calls your "Secret" Backend Proxy
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: "openrouter/auto",
        messages: [{role: "system", content: "You are King AI, wise and helpful."}, ...history]
      })
    });

    const data = await response.json();
    const reply = data.choices[0].message.content;
    addMessage('ai', reply);
    history.push({role: "assistant", content: reply});
  } catch (e) {
    addMessage('ai', "⚠️ Kingdom connection failed.");
  }
}

function addMessage(role, text) {
  const m = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = `msg ${role}`;
  d.innerHTML = `<div class="bubble">${text}</div>`;
  m.appendChild(d);
  m.scrollTop = m.scrollHeight;
}
</script>
</body>
</html>
